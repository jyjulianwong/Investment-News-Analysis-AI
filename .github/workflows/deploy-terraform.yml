name: Deploy Infrastructure & Lambda

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "lambda/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "lambda/**"

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "1.9.0"

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_BACKEND_BUCKET: ${{ secrets.AWS_ACCOUNT_ID }}-jyjulianwong-ina-terraform-state
          TF_BACKEND_TABLE:  jyjulianwong-ina-terraform-lock
        run: |
          terraform init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="dynamodb_table=$TF_BACKEND_TABLE"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="openrouter_api_key=${{ secrets.OPENROUTER_API_KEY }}" \
            -var="tavily_api_key=${{ secrets.TAVILY_API_KEY }}" \
            -var="client_github_pages_origin=${{ secrets.CLIENT_GITHUB_PAGES_ORIGIN }}" \
            -no-color \
            -out=tfplan
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const planOutput = '${{ steps.terraform-plan.outputs.stdout }}'.slice(0, 60000);
            const body = `### Terraform Plan\n\`\`\`\n${planOutput}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  deploy:
    name: Terraform Apply + Lambda Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------------
      # Terraform apply
      # -----------------------------------------------------------------------

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        env:
          TF_BACKEND_BUCKET: ${{ secrets.AWS_ACCOUNT_ID }}-jyjulianwong-ina-terraform-state
          TF_BACKEND_TABLE:  jyjulianwong-ina-terraform-lock
        run: |
          terraform init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="dynamodb_table=$TF_BACKEND_TABLE"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="openrouter_api_key=${{ secrets.OPENROUTER_API_KEY }}" \
            -var="tavily_api_key=${{ secrets.TAVILY_API_KEY }}" \
            -var="client_github_pages_origin=${{ secrets.CLIENT_GITHUB_PAGES_ORIGIN }}" \
            -auto-approve \
            -no-color

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "ecr_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "lambda_name=$(terraform output -raw lambda_function_name)" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Build & push Lambda container image
      # -----------------------------------------------------------------------

      - name: Log in to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Lambda image
        env:
          ECR_URL: ${{ steps.tf_outputs.outputs.ecr_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --push \
            -t "$ECR_URL:$IMAGE_TAG" \
            -t "$ECR_URL:latest" \
            lambda/

      # -----------------------------------------------------------------------
      # Update Lambda to use the new image
      # -----------------------------------------------------------------------

      - name: Update Lambda function code
        env:
          ECR_URL:      ${{ steps.tf_outputs.outputs.ecr_url }}
          LAMBDA_NAME:  ${{ steps.tf_outputs.outputs.lambda_name }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --image-uri "$ECR_URL:$IMAGE_TAG" \
            --region "$AWS_REGION"
