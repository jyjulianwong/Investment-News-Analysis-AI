<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment News Analysis — Reports</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a3a5c;
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.01em; }
    header nav a {
      color: #a8c8e8;
      text-decoration: none;
      font-size: 0.9rem;
      margin-left: 24px;
    }
    header nav a:hover { color: #fff; }
    header nav a.active { color: #fff; font-weight: 600; }

    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 48px auto;
      padding: 0 24px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px;
    }

    .card h2 { font-size: 1.1rem; margin-bottom: 8px; color: #1a3a5c; }
    .card p.subtitle { font-size: 0.88rem; color: #666; margin-bottom: 28px; }

    #reports-list { list-style: none; }

    .report-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid #eef1f5;
    }
    .report-row:last-child { border-bottom: none; }

    .report-date {
      font-weight: 600;
      font-size: 0.95rem;
      color: #1a3a5c;
    }

    .report-links { display: flex; gap: 12px; }
    .report-links a {
      font-size: 0.83rem;
      padding: 5px 14px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .report-links a:hover { opacity: 0.8; }
    .btn-pdf {
      background: #1a3a5c;
      color: #fff;
    }
    .btn-md {
      background: #e8f0f8;
      color: #1a3a5c;
    }

    #loading { color: #888; font-size: 0.9rem; }
    #error   { color: #c0392b; font-size: 0.88rem; }
    #empty   { color: #888; font-size: 0.88rem; }
  </style>
</head>
<body>

<header>
  <h1>Investment News Analysis</h1>
  <nav>
    <a href="index.html">Submit</a>
    <a href="reports.html" class="active">Reports</a>
  </nav>
</header>

<main>
  <div class="card">
    <h2>Daily Reports</h2>
    <p class="subtitle">
      Reports are generated automatically at 12:00 UTC each day.
      Click a date to download the PDF or view the Markdown source.
    </p>

    <div id="loading">Loading reports…</div>
    <div id="error"  style="display:none"></div>
    <div id="empty"  style="display:none">No reports found yet.</div>
    <ul id="reports-list" style="display:none"></ul>
  </div>
</main>

<script>
  // Replace with your actual public S3 output bucket URL after deployment.
  // Format: https://<bucket-name>.s3.<region>.amazonaws.com
  const S3_BASE = "https://jyjulianwong-ina-news-output.s3.eu-west-2.amazonaws.com";

  const loadingEl = document.getElementById("loading");
  const errorEl   = document.getElementById("error");
  const emptyEl   = document.getElementById("empty");
  const listEl    = document.getElementById("reports-list");

  async function loadReports() {
    try {
      // List all objects under output/ using the S3 REST list API
      const url = `${S3_BASE}?list-type=2&prefix=output/&delimiter=/`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`S3 list failed: HTTP ${resp.status}`);

      const text = await resp.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "application/xml");

      // Each day's folder appears as a <CommonPrefixes><Prefix> element
      const prefixes = Array.from(xml.querySelectorAll("CommonPrefixes > Prefix"))
        .map(el => el.textContent.trim())   // e.g. "output/2025-11-01/"
        .map(p => p.replace(/^output\/|\/$/g, ""))  // => "2025-11-01"
        .filter(Boolean)
        .sort()
        .reverse(); // newest first

      loadingEl.style.display = "none";

      if (prefixes.length === 0) {
        emptyEl.style.display = "";
        return;
      }

      listEl.style.display = "";
      listEl.innerHTML = prefixes.map(day => `
        <li class="report-row">
          <span class="report-date">${day}</span>
          <div class="report-links">
            <a class="btn-pdf" href="${S3_BASE}/output/${day}/report.pdf" target="_blank" rel="noopener">PDF</a>
            <a class="btn-md"  href="${S3_BASE}/output/${day}/report.md"  target="_blank" rel="noopener">Markdown</a>
          </div>
        </li>
      `).join("");

    } catch (err) {
      loadingEl.style.display = "none";
      errorEl.style.display = "";
      errorEl.textContent = `Failed to load reports: ${err.message}`;
    }
  }

  loadReports();
</script>

</body>
</html>
